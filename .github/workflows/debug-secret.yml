name: 🔍 Debug Secret Visibility
on: workflow_dispatch
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Secret
        run: |
          if [ -z "${{ secrets.ATHENA_DEPLOY_TOKEN }}" ]; then
            echo "❌ ERROR: ATHENA_DEPLOY_TOKEN is LEEG of NIET GEVONDEN"
            exit 1
          else
            echo "✅ SUCCESS: ATHENA_DEPLOY_TOKEN is aanwezig"
          fi
